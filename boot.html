<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Windows 12 Web Version</title> <!-- Optimized: descriptive page title -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Optimized: added viewport meta tag for mobile compatibility -->
    <style>
        @font-face {
            font-family: 'dos';
            src: url(../../fonts/dos.ttf);
        }

        * {
            font-family: 'dos';
            margin: 0; /* Optimized: merged duplicated CSS properties */
            padding: 0;
            border: 0;
            user-select: none;
            scrollbar-width: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -o-user-select: none;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        body {
            background-color: black;
            color: white;
            cursor: none; /* Optimized: use CSS property to hide cursor */
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <body style="background-color: black;color: white;cursor: none;/*Loading screen hides cursor*/" id="body" scroll="no"></body>
    <div id="center-div" style="width: 114; /* width doesn't matter, height matters */"></div>
    <div id="info">
        <div class="loading">
            <p>Starting</p>
            <div id="load" style="background-color: #acabac; width: 200px; height: 20px;"></div>
            <div id="back" style="background-color: #565656; width: 200px; height: 20px;"></div>
            <br>
        </div>
        <p style="text-align: center;">Press F2 or touch screen to enter SETUP</p>
    </div>
    <script src="./scripts/boot_kernel.js"></script>
</body>
</html>
